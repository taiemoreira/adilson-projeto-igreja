<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Doação de Costela · Paróquia Santa Edwiges</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          "Helvetica Neue",
          sans-serif;
      }

      .min-h-screen {
        min-height: 100vh;
      }

      .bg-gradient-to-b {
        background-image: linear-gradient(to bottom, #fef3c7, #fff7ed);
      }

      .flex {
        display: flex;
      }

      .flex-col {
        flex-direction: column;
      }

      .items-center {
        align-items: center;
      }

      .justify-center {
        justify-content: center;
      }

      .justify-start {
        justify-content: flex-start;
      }

      .py-10 {
        padding-top: 2.5rem;
        padding-bottom: 2.5rem;
      }

      .px-4 {
        padding-left: 1rem;
        padding-right: 1rem;
      }

      .text-center {
        text-align: center;
      }

      .mb-8 {
        margin-bottom: 2rem;
      }

      .max-w-lg {
        max-width: 32rem;
      }

      .mb-4 {
        margin-bottom: 1rem;
      }

      .w-20 {
        width: 5rem;
      }

      .h-20 {
        height: 5rem;
      }

      .rounded-full {
        border-radius: 9999px;
      }

      .bg-amber-700 {
        background-color: #b45309;
      }

      .shadow-lg {
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      }

      .text-4xl {
        font-size: 2.25rem;
      }

      .text-3xl {
        font-size: 1.875rem;
      }

      .font-black {
        font-weight: 900;
      }

      .text-amber-900 {
        color: #78350f;
      }

      .tracking-tight {
        letter-spacing: -0.025em;
      }

      .mb-1 {
        margin-bottom: 0.25rem;
      }

      .font-semibold {
        font-weight: 600;
      }

      .text-lg {
        font-size: 1.125rem;
      }

      .text-amber-700 {
        color: #92400e;
      }

      .text-sm {
        font-size: 0.875rem;
      }

      .text-amber-600 {
        color: #d97706;
      }

      .mt-2 {
        margin-top: 0.5rem;
      }

      .w-full {
        width: 100%;
      }

      .max-w-md {
        max-width: 28rem;
      }

      .bg-white {
        background-color: white;
      }

      .rounded-2xl {
        border-radius: 1rem;
      }

      .border {
        border-width: 1px;
      }

      .border-amber-100 {
        border-color: #fef3c7;
      }

      .p-8 {
        padding: 2rem;
      }

      .space-y-5 > * + * {
        margin-top: 1.25rem;
      }

      .hidden {
        display: none;
      }

      .block {
        display: block;
      }

      .text-red-500 {
        color: #ef4444;
      }

      input,
      select,
      button {
        font-family: inherit;
      }

      .px-4 {
        padding-left: 1rem;
        padding-right: 1rem;
      }

      .py-3 {
        padding-top: 0.75rem;
        padding-bottom: 0.75rem;
      }

      .rounded-xl {
        border-radius: 0.75rem;
      }

      .border-amber-200 {
        border-color: #fde68a;
      }

      .focus\:outline-none:focus {
        outline: none;
      }

      .focus\:ring-2:focus {
        box-shadow: 0 0 0 2px;
      }

      .focus\:ring-amber-400:focus {
        --tw-ring-color: #fbbf24;
      }

      .bg-amber-50 {
        background-color: #fffbeb;
      }

      .text-amber-900 {
        color: #78350f;
      }

      .placeholder-amber-300::placeholder {
        color: #fcd34d;
      }

      .relative {
        position: relative;
      }

      .absolute {
        position: absolute;
      }

      .left-4 {
        left: 1rem;
      }

      .top-1\/2 {
        top: 50%;
      }

      .-translate-y-1\/2 {
        transform: translateY(-50%);
      }

      .text-amber-500 {
        color: #f59e0b;
      }

      .pl-10 {
        padding-left: 2.5rem;
      }

      .pr-4 {
        padding-right: 1rem;
      }

      .mb-2 {
        margin-bottom: 0.5rem;
      }

      .grid {
        display: grid;
      }

      .grid-cols-2 {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .gap-2 {
        gap: 0.5rem;
      }

      .cursor-pointer {
        cursor: pointer;
      }

      .transition-colors {
        transition-property: background-color, border-color;
        transition-duration: 150ms;
      }

      .hover\:border-amber-400:hover {
        border-color: #fbbf24;
      }

      .accent-amber-700 {
        accent-color: #b45309;
      }

      .py-4 {
        padding-top: 1rem;
        padding-bottom: 1rem;
      }

      .bg-amber-700 {
        background-color: #b45309;
      }

      .hover\:bg-amber-800:hover {
        background-color: #92400e;
      }

      .disabled\:opacity-60:disabled {
        opacity: 0.6;
      }

      .text-white {
        color: white;
      }

      .font-bold {
        font-weight: 700;
      }

      .shadow-md {
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      }

      .mt-6 {
        margin-top: 1.5rem;
      }

      .text-xs {
        font-size: 0.75rem;
      }

      .text-amber-500 {
        color: #f59e0b;
      }

      .md\:text-4xl {
        font-size: 2.25rem;
      }

      .alert {
        padding: 1rem;
        border-radius: 0.75rem;
        margin-bottom: 1rem;
      }

      .alert-success {
        background-color: #dcfce7;
        border: 1px solid #bbf7d0;
        color: #166534;
      }

      .alert-error {
        background-color: #fee2e2;
        border: 1px solid #fecaca;
        color: #991b1b;
      }

      .textofesta {
        font-size: 20px;
      }

      img {
        width: 150px;
        height: 150px;
        border-radius: 50%;
        margin-bottom: 60px;
      }

      .divcentral {
        padding-top: 100px;
      }
    </style>
  </head>
  <body>
    <div
      class="divcentral min-h-screen bg-gradient-to-b flex flex-col items-center justify-start py-10 px-4"
    >
      <div class="text-center mb-8 max-w-lg">
        <div class="flex justify-center mb-4">
          <div
            class="w-20 h-20 rounded-full bg-amber-700 flex items-center justify-center shadow-lg"
          >
            <img src="img/img-logo.png" alt="Logo Paróquia Santa Edwiges">
          </div>
        </div>
        <h1
          class="text-3xl md:text-4xl font-black text-amber-900 tracking-tight mb-1"
        >
          Paróquia Santa Edwiges
        </h1>
        <p class="text-amber-700 font-semibold text-lg textofesta">Festa Padroeira 2026</p>
        <p class="text-amber-700 font-semibold text-lg">Doação de Costela</p>
        <p class="text-amber-600 text-sm mt-2">
          Preencha o formulário abaixo para registrar sua doação
        </p>
      </div>

      <div
        class="w-full max-w-md bg-white rounded-2xl shadow-lg border border-amber-100 p-8"
      >
        <div id="messageArea"></div>

        <form id="donationForm" class="space-y-5">
          <div>
            <label
              for="name"
              class="block text-sm font-semibold text-amber-900 mb-1"
            >
              Nome <span class="text-red-500">*</span>
            </label>
            <input
              type="text"
              id="name"
              name="name"
              required
              placeholder="Seu nome completo"
              class="w-full px-4 py-3 rounded-xl border border-amber-200 focus:outline-none focus:ring-2 focus:ring-amber-400 bg-amber-50 text-amber-900"
            />
          </div>

          <div>
            <label
              for="phone"
              class="block text-sm font-semibold text-amber-900 mb-1"
            >
              Telefone <span class="text-red-500">*</span>
            </label>
            <input
              type="tel"
              id="phone"
              name="phone"
              required
              placeholder="(00) 00000-0000"
              class="w-full px-4 py-3 rounded-xl border border-amber-200 focus:outline-none focus:ring-2 focus:ring-amber-400 bg-amber-50 text-amber-900"
            />
          </div>

          <div>
            <label
              for="community"
              class="block text-sm font-semibold text-amber-900 mb-1"
            >
              Comunidade <span class="text-red-500">*</span>
            </label>
            <select
              id="community"
              name="community"
              required
              class="w-full px-4 py-3 rounded-xl border border-amber-200 focus:outline-none focus:ring-2 focus:ring-amber-400 bg-amber-50 text-amber-900"
            >
              <option value="" selected>Selecione sua comunidade...</option>
              <option value="Comunidade Matriz">Comunidade Matriz</option>
              <option value="Comunidade Santa Helena">
                Comunidade Santa Helena
              </option>
              <option value="Comunidade Aparecida">Comunidade Aparecida</option>
              <option value="Comunidade Espirito Santo">
                Comunidade Espirito Santo
              </option>
              <option value="Comunidade São Roque">Comunidade São Roque</option>
            </select>
          </div>

          <div>
            <label
              for="amount"
              class="block text-sm font-semibold text-amber-900 mb-1"
            >
              Valor Doado (R$) <span class="text-red-500">*</span>
            </label>
            <div class="relative">
              <span
                class="absolute left-4 top-1/2 -translate-y-1/2 text-amber-500 font-semibold"
                >R$</span
              >
              <input
                type="text"
                id="amount"
                name="amount"
                required
                value="150,00"
                readonly
                class="w-full pl-10 pr-4 py-3 rounded-xl border border-amber-200 focus:outline-none focus:ring-2 focus:ring-amber-400 bg-amber-50 text-amber-900 cursor-not-allowed"
              />
            </div>
            <p class="text-xs text-amber-600 mt-1">Valor fixo da costela</p>
          </div>

          <div>
            <label class="block text-sm font-semibold text-amber-900 mb-2">
              Forma de Pagamento <span class="text-red-500">*</span>
            </label>
            <div class="grid grid-cols-2 gap-2">
              <label class="flex items-center gap-2 px-4 py-3 rounded-xl border cursor-pointer transition-colors border-amber-200 bg-amber-50 text-amber-700 hover:border-amber-400">
                <input type="radio" required class="accent-amber-700" name="payment" value="pix"> PIX
              </label>
              <label class="flex items-center gap-2 px-4 py-3 rounded-xl border cursor-pointer transition-colors border-amber-200 bg-amber-50 text-amber-700 hover:border-amber-400">
                <input type="radio" required class="accent-amber-700" name="payment" value="dinheiro"> Dinheiro
              </label>
              <label class="flex items-center gap-2 px-4 py-3 rounded-xl border cursor-pointer transition-colors border-amber-200 bg-amber-50 text-amber-700 hover:border-amber-400">
                <input type="radio" required class="accent-amber-700" name="payment" value="cartao_credito"> Cartão de Crédito
              </label>
              <label class="flex items-center gap-2 px-4 py-3 rounded-xl border cursor-pointer transition-colors border-amber-200 bg-amber-50 text-amber-700 hover:border-amber-400">
                <input type="radio" required class="accent-amber-700" name="payment" value="cartao_debito"> Cartão de Débito
              </label>
              <label class="flex items-center gap-2 px-4 py-3 rounded-xl border cursor-pointer transition-colors border-amber-200 bg-amber-50 text-amber-700 hover:border-amber-400">
                <input type="radio" required class="accent-amber-700" name="payment" value="transferencia"> Transferência Bancária
              </label>
            </div>
          </div>

          <div>
            <label class="block text-sm font-semibold text-amber-900 mb-2">
              Comprovante de Pagamento <span class="text-red-500">*</span>
            </label>
            <div>
              <label class="flex items-center gap-2 px-4 py-3 rounded-xl border cursor-pointer transition-colors border-amber-200 bg-amber-50 text-amber-700 hover:border-amber-400">
                <input type="file" id="comprovante" name="comprovante" accept="image/*" class="hidden" />
                <span>📎 Clique para anexar comprovante</span>
              </label>
              <div id="previewContainer" class="mt-3 hidden">
                <p class="text-xs text-amber-600 mb-1">Pré-visualização:</p>
                <img id="previewImagem" src="#" alt="Pré-visualização do comprovante" class="w-full max-h-48 object-cover rounded-lg border border-amber-200" />
              </div>
              <p class="text-xs text-amber-500 mt-1">Formatos aceitos: JPG, PNG (máx. 5MB)</p>
            </div>
          </div>

          <button
            type="submit"
            id="submitBtn"
            class="w-full py-4 bg-amber-700 hover:bg-amber-800 disabled:opacity-60 text-white font-bold text-lg rounded-xl transition-colors shadow-md mt-2"
          >
            Registrar Doação
          </button>
        </form>
      </div>

      <p class="text-amber-500 text-xs mt-6 text-center">
        Paróquia Santa Edwiges · Que Deus abençoe a todos
      </p>
    </div>

    <script>
      const GOOGLE_SHEETS_WEBAPP_URL =
        "https://script.google.com/macros/s/AKfycbwXBE0BAfPUD8TPr7uX8epLdQI_nDZR_kJFb_Xdz1gYG8gEGx6gOf4PVtuZf0y_oBY8hw/exec";

      // Teste se a URL está acessível ao carregar a página
      fetch(GOOGLE_SHEETS_WEBAPP_URL)
        .then((response) => response.json())
        .then((data) => console.log("✅ API online:", data))
        .catch((error) => console.error("❌ API offline:", error));

      // Máscara de telefone
      function formatPhone(input) {
        let value = input.value.replace(/\D/g, "");
        if (value.length <= 10) {
          value = value.replace(/(\d{2})(\d{4})(\d{4})/, "($1) $2-$3");
        } else {
          value = value.replace(/(\d{2})(\d{5})(\d{4})/, "($1) $2-$3");
        }
        input.value = value;
      }

      const phoneInput = document.getElementById("phone");
      if (phoneInput) {
        phoneInput.addEventListener("input", function () {
          formatPhone(this);
        });
      }

      // Pré-visualização do comprovante
      const comprovanteInput = document.getElementById("comprovante");
      const previewContainer = document.getElementById("previewContainer");
      const previewImagem = document.getElementById("previewImagem");

      if (comprovanteInput) {
        comprovanteInput.addEventListener("change", function (e) {
          const arquivo = e.target.files[0];
          
          if (arquivo && arquivo.type.startsWith("image/")) {
            const reader = new FileReader();
            reader.onload = function (event) {
              previewImagem.src = event.target.result;
              previewContainer.classList.remove("hidden");
            };
            reader.readAsDataURL(arquivo);
          } else if (arquivo) {
            previewContainer.classList.add("hidden");
            alert("Por favor, selecione apenas imagens (JPG, PNG)");
            comprovanteInput.value = "";
          } else {
            previewContainer.classList.add("hidden");
          }
        });
      }

      function showMessage(message, type) {
        const messageArea = document.getElementById("messageArea");
        if (!messageArea) return;

        const alertDiv = document.createElement("div");
        alertDiv.className = `alert alert-${type}`;
        alertDiv.innerHTML = message;

        messageArea.innerHTML = "";
        messageArea.appendChild(alertDiv);

        setTimeout(() => {
          if (alertDiv.parentNode) {
            alertDiv.remove();
          }
        }, 5000);
      }

      const form = document.getElementById("donationForm");
      const submitBtn = document.getElementById("submitBtn");

      if (form) {
        form.addEventListener("submit", async function (e) {
          e.preventDefault();

          submitBtn.disabled = true;
          submitBtn.textContent = "Enviando...";

          // Verificar se o comprovante foi anexado
          const comprovante = document.getElementById("comprovante");
          if (!comprovante.files || comprovante.files.length === 0) {
            showMessage("Por favor, anexe o comprovante de pagamento.", "error");
            submitBtn.disabled = false;
            submitBtn.textContent = "Registrar Doação";
            return;
          }

          const formData = {
            name: document.getElementById("name")?.value || "",
            phone: document.getElementById("phone")?.value || "",
            community: document.getElementById("community")?.value || "",
            amount: document.getElementById("amount")?.value || "",
            payment:
              document.querySelector('input[name="payment"]:checked')?.value ||
              "",
            comprovante_nome: comprovante.files[0]?.name || "",
            timestamp: new Date().toLocaleString("pt-BR"),
          };

          console.log("📤 Enviando dados:", formData);
          console.log("📡 Para URL:", GOOGLE_SHEETS_WEBAPP_URL);

          if (
            !formData.name ||
            !formData.phone ||
            !formData.community ||
            !formData.amount ||
            !formData.payment
          ) {
            showMessage(
              "Por favor, preencha todos os campos obrigatórios.",
              "error"
            );
            submitBtn.disabled = false;
            submitBtn.textContent = "Registrar Doação";
            return;
          }

          try {
            const response = await fetch(GOOGLE_SHEETS_WEBAPP_URL, {
              method: "POST",
              headers: {
                "Content-Type": "application/x-www-form-urlencoded",
              },
              body: new URLSearchParams(formData),
            });

            console.log("📥 Status da resposta:", response.status);
            console.log("📥 Response OK?", response.ok);

            const textResponse = await response.text();
            console.log("📥 Resposta bruta:", textResponse);

            try {
              const result = JSON.parse(textResponse);
              console.log("✅ Resposta JSON:", result);

              if (result.status === "success") {
                showMessage(
                  "✅ Doação registrada com sucesso! Deus abençoe.",
                  "success"
                );
                form.reset();
                document
                  .querySelectorAll('input[type="radio"]')
                  .forEach((radio) => (radio.checked = false));
                previewContainer.classList.add("hidden");
                previewImagem.src = "";
              } else {
                showMessage(
                  "❌ Erro do servidor: " +
                    (result.message || "Tente novamente."),
                  "error"
                );
              }
            } catch (e) {
              console.error("❌ Resposta não é JSON:", e);
              showMessage(
                "⚠️ Resposta inesperada do servidor. Verifique o console (F12).",
                "error"
              );
            }
          } catch (error) {
            console.error("❌ Erro na requisição:", error);
            console.error("❌ Tipo do erro:", error.name);
            console.error("❌ Mensagem:", error.message);

            if (error.message.includes("CORS")) {
              showMessage(
                '❌ Erro de CORS. Verifique se o Google Apps Script está com acesso "Qualquer pessoa".',
                "error"
              );
            } else if (error.message.includes("Failed to fetch")) {
              showMessage(
                "❌ Não foi possível conectar ao Google Sheets. Verifique sua internet e a URL.",
                "error"
              );
            } else {
              showMessage("❌ Erro: " + error.message, "error");
            }
          } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = "Registrar Doação";
          }
        });
      }
    </script>
  </body>
</html>
